name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun test tests/*.test.ts
      # Note: detection/E2E examples need a real Chrome + GPU/Xvfb and a clean IP,
      # so they run locally, not in CI. See examples/detect.ts and hardtargets.ts.
